services:
  - type: web
    name: convex-api
    runtime: python
    plan: free
    rootDir: auth-system
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ENVIRONMENT
        value: production
      - key: PROJECT_NAME
        value: "ConVex API"

      # Auto-generated by Render at provision time - never reused across environments.
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      # Rotated on every /auth/refresh call - a sliding window, not a hard cap. A user who opens
      # the app at least this often stays signed in without re-entering their password.
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "60"

      # Paste in the connection string from your Postgres provider (Neon, etc.) - postgres://
      # or postgresql://, with or without sslmode=require, all accepted as-is.
      - key: DATABASE_URL
        sync: false

      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      - key: PAYSTACK_BASE_URL
        value: https://api.paystack.co
      - key: PAYSTACK_SECRET_KEY
        sync: false

      # Your deployed frontend URL (e.g. https://your-app.vercel.app) - used both to build
      # Paystack's post-checkout redirect and as the allowed CORS origin.
      - key: FRONTEND_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
