name: Keep backend warm

# Render's free tier spins the backend down after 15 minutes of no traffic, and the first
# request after that takes 10-30+ seconds to wake it back up. Pinging /health often enough
# that it never goes idle avoids that cold start for real users.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf --max-time 30 https://convex-api-jlxc.onrender.com/health \
            || echo "Ping failed - backend may have been cold-starting or briefly down. Next scheduled run will retry."
